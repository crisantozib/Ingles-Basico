<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f1923">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Inglés Básico — Ghio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1923;
  --surface: #172030;
  --card: #1e2d3e;
  --border: #2a3d52;
  --accent: #e8c97a;
  --accent2: #5bc4a0;
  --accent3: #e07a5f;
  --text: #d6e4f0;
  --muted: #7a99b5;
  --correct: #5bc4a0;
  --wrong: #e07a5f;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  overscroll-behavior: none;
}

/* ── HOME ────────────────────────────── */
#home {
  display: flex; flex-direction: column; min-height: 100vh;
  padding: 0 0 80px;
}

.home-header {
  padding: 40px 20px 24px;
  border-bottom: 1px solid var(--border);
}

.home-header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2rem; color: var(--accent);
  line-height: 1.1;
}

.home-header p { color: var(--muted); font-size: 13px; margin-top: 6px; }

.progress-bar {
  height: 4px; background: var(--border);
  border-radius: 2px; margin: 16px 0 0;
}
.progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px; transition: width .5s ease;
}

.lessons-grid {
  padding: 20px;
  display: flex; flex-direction: column; gap: 12px;
}

.lesson-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 18px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer;
  transition: all .2s ease;
  position: relative; overflow: hidden;
}

.lesson-card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 60%, rgba(232,201,122,.04));
  pointer-events: none;
}

.lesson-card:active { transform: scale(.98); }

.lesson-num {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--card);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem; font-weight: 700;
  color: var(--accent); flex-shrink: 0;
  border: 1px solid var(--border);
}

.lesson-num.done {
  background: linear-gradient(135deg, #1a3a2a, #1e4d38);
  border-color: var(--accent2);
  color: var(--accent2);
}

.lesson-info { flex: 1; min-width: 0; }
.lesson-info h3 { font-size: 14px; font-weight: 500; color: var(--text); }
.lesson-info p { font-size: 12px; color: var(--muted); margin-top: 2px; }

.lesson-tags {
  display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px;
}

.tag {
  font-size: 10px; padding: 2px 7px;
  border-radius: 20px; border: 1px solid;
  font-weight: 500;
}

.tag-blue { color: #60a5fa; border-color: #1d3a6b; }
.tag-gold { color: var(--accent); border-color: #4a3a10; }
.tag-green { color: var(--accent2); border-color: #1a4a38; }
.tag-red { color: var(--accent3); border-color: #4a1a10; }

.lesson-arrow { color: var(--muted); font-size: 18px; }

/* ── LESSON VIEW ─────────────────────── */
#lesson-view { display: none; flex-direction: column; min-height: 100vh; }

.lesson-topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50;
}

.btn-back {
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); border-radius: 8px;
  padding: 7px 12px; font-size: 13px; cursor: pointer;
  flex-shrink: 0;
}

.lesson-topbar h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1rem; color: var(--accent); flex: 1; min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Tabs */
.tabs-wrap {
  overflow-x: auto; scrollbar-width: none;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.tabs-wrap::-webkit-scrollbar { display: none; }

.tabs {
  display: flex; padding: 0 12px; gap: 0;
  white-space: nowrap;
}

.tab {
  padding: 12px 14px;
  font-size: 12px; font-weight: 500;
  color: var(--muted); cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .2s;
  flex-shrink: 0;
}

.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* Content area */
.lesson-content { padding: 16px; flex: 1; padding-bottom: 80px; }

.panel { display: none; }
.panel.active { display: block; }

/* Cards inside panels */
.vocab-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.vocab-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
}

.vocab-en {
  font-weight: 500; color: var(--accent);
  font-size: 13px;
}

.vocab-pron {
  font-size: 11px; color: var(--muted); margin-top: 1px;
  font-style: italic;
}

.vocab-es {
  font-size: 12px; color: var(--text); margin-top: 4px;
}

/* Tables */
.conj-table {
  width: 100%; border-collapse: collapse;
  font-size: 12px; margin: 10px 0;
}

.conj-table th {
  background: var(--card);
  color: var(--muted); font-weight: 500;
  padding: 7px 10px; text-align: left;
  border-bottom: 1px solid var(--border);
}

.conj-table td {
  padding: 7px 10px;
  border-bottom: 1px solid rgba(42,61,82,.5);
}

.conj-table tr:last-child td { border-bottom: none; }

.conj-table .en { color: var(--accent); font-weight: 500; }
.conj-table .es { color: var(--text); }

/* Section header */
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem; color: var(--accent);
  margin: 20px 0 10px;
}

.section-title:first-child { margin-top: 0; }

.info-box {
  background: var(--card);
  border-left: 3px solid var(--accent);
  border-radius: 0 10px 10px 0;
  padding: 12px 14px;
  margin: 10px 0;
  font-size: 13px;
  line-height: 1.6;
}

.info-box b { color: var(--accent); }

.phrase-row {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 12px; padding: 8px 0;
  border-bottom: 1px solid rgba(42,61,82,.4);
  font-size: 13px;
}

.phrase-row:last-child { border-bottom: none; }
.phrase-en { color: var(--accent2); font-weight: 500; flex: 1; }
.phrase-es { color: var(--muted); text-align: right; flex: 1; }

.opposite-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}

.opp-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px;
  text-align: center;
}

.opp-card .word { font-size: 14px; font-weight: 500; color: var(--accent); }
.opp-card .pron { font-size: 11px; color: var(--muted); font-style: italic; }
.opp-card .trans { font-size: 12px; color: var(--text); margin-top: 4px; }
.opp-divider { text-align: center; color: var(--accent3); font-size: 11px; margin: 4px 0; }

/* Exam */
.exam-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 10px;
}

.exam-q { font-size: 13px; color: var(--text); font-weight: 500; }

.exam-a {
  margin-top: 10px;
  padding: 10px;
  background: rgba(91,196,160,.08);
  border: 1px solid rgba(91,196,160,.2);
  border-radius: 8px;
  font-size: 13px; color: var(--accent2);
  display: none;
}

.btn-reveal {
  margin-top: 10px;
  padding: 7px 14px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 8px; font-size: 12px; cursor: pointer;
}

.btn-reveal-all {
  width: 100%; padding: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--accent); font-weight: 500;
  border-radius: 10px; font-size: 13px; cursor: pointer;
  margin-bottom: 16px;
}

/* Quiz */
.quiz-wrap { max-width: 100%; }

.quiz-progress {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px;
}

.quiz-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; }
.quiz-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s; }
.quiz-counter { font-size: 12px; color: var(--muted); white-space: nowrap; }

.quiz-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px 16px;
  min-height: 120px;
}

.quiz-q {
  font-size: 1rem; color: var(--text);
  text-align: center; font-weight: 500;
  margin-bottom: 20px; line-height: 1.5;
}

.quiz-options {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.quiz-opt {
  padding: 11px 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text); font-size: 12px;
  cursor: pointer; text-align: center;
  transition: all .15s;
}

.quiz-opt:active { transform: scale(.97); }
.quiz-opt.correct { background: rgba(91,196,160,.15); border-color: var(--accent2); color: var(--accent2); }
.quiz-opt.wrong { background: rgba(224,122,95,.15); border-color: var(--accent3); color: var(--accent3); }

.quiz-result {
  text-align: center; padding: 30px 20px;
}

.quiz-score {
  font-family: 'Playfair Display', serif;
  font-size: 3rem; color: var(--accent);
}

.quiz-result p { color: var(--muted); margin-top: 8px; font-size: 13px; }

.btn-restart {
  margin-top: 20px; padding: 13px 30px;
  background: linear-gradient(135deg, var(--accent), #c9a845);
  border: none; border-radius: 10px;
  color: #0f1923; font-weight: 700;
  font-size: 14px; cursor: pointer;
}

/* ── BOTTOM NAV ──────────────────────── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 10px 16px 14px;
  display: flex; justify-content: center;
  z-index: 100;
}

.btn-home-nav {
  padding: 10px 24px;
  background: var(--card); border: 1px solid var(--border);
  color: var(--muted); border-radius: 10px;
  font-size: 13px; cursor: pointer;
}

/* Compound words list */
.compound-list { list-style: none; }
.compound-list li {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 7px 0; border-bottom: 1px solid rgba(42,61,82,.4);
  font-size: 13px;
}
.compound-list li:last-child { border-bottom: none; }
.comp-word { color: var(--accent2); font-weight: 500; min-width: 110px; }
.comp-parts { color: var(--muted); font-size: 11px; }
.comp-es { color: var(--text); }

/* Verb combo cards */
.combo-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 12px; margin-bottom: 8px;
}
.combo-verb { font-weight: 600; color: var(--accent); font-size: 13px; }
.combo-es { font-size: 12px; color: var(--text); margin-top: 2px; }
.combo-ex { font-size: 11px; color: var(--muted); margin-top: 4px; font-style: italic; }

/* responsive */
@media (max-width: 360px) {
  .vocab-grid { grid-template-columns: 1fr; }
  .quiz-options { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ══════════════ HOME ══════════════ -->
<div id="home">
  <div class="home-header">
    <h1>Inglés Básico</h1>
    <p>Augusto Ghio · 11 Lecciones</p>
    <div class="progress-bar">
      <div class="progress-fill" id="global-progress" style="width:0%"></div>
    </div>
  </div>

  <div class="lessons-grid" id="lessons-grid"></div>
</div>

<!-- ══════════════ LESSON VIEW ══════════════ -->
<div id="lesson-view">
  <div class="lesson-topbar">
    <button class="btn-back" onclick="goHome()">← Inicio</button>
    <h2 id="lesson-title"></h2>
  </div>
  <div class="tabs-wrap">
    <div class="tabs" id="tabs-container"></div>
  </div>
  <div class="lesson-content" id="lesson-content"></div>
</div>

<script>
// ════════════════════════════════════════════════════════
// LESSON DATA
// ════════════════════════════════════════════════════════

const LESSONS = [

// ─────────────────────── LECCIÓN 1 ───────────────────────
{
  num: 1,
  title: "Primera Lección",
  subtitle: "Palabras internacionales · IS/ARE · Adjetivos · Verbos",
  color: "#60a5fa",
  tabs: [
    { id:"internat", label:"Palabras Int." },
    { id:"ing", label:"-ING" },
    { id:"isare", label:"IS / ARE" },
    { id:"adj1", label:"Adjetivos" },
    { id:"verbos1", label:"16 Verbos" },
    { id:"vocab1", label:"Vocabulario" },
    { id:"exam1", label:"Examen" },
    { id:"quiz1", label:"Práctica" },
  ],
  panels: {
    internat: `
      <div class="section-title">Palabras Idénticas al Español</div>
      <div class="info-box">Estas palabras se escriben igual (o casi igual) que en español. Solo cambia la <b>pronunciación</b>. ¡Ya las sabes!</div>
      <div class="vocab-grid">
        ${[
          ["Animal","(ánimal)","Animal"],["Base","(béis)","Base"],["Control","(contról)","Control"],
          ["Hotel","(jotél)","Hotel"],["Opera","(ópera)","Ópera"],["Tango","(tángou)","Tango"],
          ["Radio","(réidio)","Radio"],["Gas","(gas)","Gas"],["Piano","(piáno)","Piano"],
          ["Motor","(móutor)","Motor"],["Color","(cólor)","Color"],["Mineral","(míneral)","Mineral"],
          ["Metal","(métal)","Metal"],["Alcohol","(álcohol)","Alcohol"],["Central","(séntral)","Central"],
          ["Final","(fáinal)","Final"],["Tropical","(trópical)","Tropical"],["Natural","(náchural)","Natural"],
          ["Normal","(nórmal)","Normal"],["Total","(tótal)","Total"],["Local","(lóucal)","Local"],
          ["Canal","(canál)","Canal"],["Capital","(cápital)","Capital"],["Hospital","(jóspital)","Hospital"],
          ["Material","(matírial)","Material"],["General","(yéneral)","General"],["Sexual","(séksual)","Sexual"],
          ["Festival","(féstival)","Festival"],["Usual","(iúsual)","Usual"],["Individual","(indivídual)","Individual"],
          ["Cultural","(cálchural)","Cultural"],["Principal","(prínsipel)","Principal"],["Social","(sóuSHal)","Social"],
          ["Personal","(pérsonal)","Personal"]
        ].map(([en,pron,es])=>`
        <div class="vocab-item">
          <div class="vocab-en">${en}</div>
          <div class="vocab-pron">${pron}</div>
          <div class="vocab-es">${es}</div>
        </div>`).join('')}
      </div>`,

    ing: `
      <div class="section-title">Terminación -ING</div>
      <div class="info-box">En español: <b>-ando / -iendo</b>. En inglés: se agrega <b>-ing</b> al verbo. Si termina en <i>e</i> muda, se quita antes de agregar -ing.</div>
      <div class="vocab-grid">
        ${[
          ["Light → Lighting","(láiting)","Luz → Iluminando"],
          ["Work → Working","(uérking)","Trabajo → Trabajando"],
          ["Smile → Smiling","(smáiling)","Sonrisa → Sonriendo"],
          ["Walk → Walking","(uóking)","Caminar → Caminando"],
          ["Paint → Painting","(péinting)","Pintar → Pintando"],
          ["Cry → Crying","(cráiing)","Llorar → Llorando"],
          ["Play → Playing","(pléiing)","Jugar → Jugando"],
          ["Rain → Raining","(réining)","Llover → Lloviendo"],
          ["Read → Reading","(ríiding)","Leer → Leyendo"],
          ["Come → Coming","(cáming)","Venir → Viniendo"],
          ["Make → Making","(méiking)","Hacer → Haciendo"],
          ["Go → Going","(góuing)","Ir → Yendo"],
          ["Give → Giving","(guíving)","Dar → Dando"],
          ["See → Seeing","(síiing)","Ver → Viendo"],
          ["Say → Saying","(séiing)","Decir → Diciendo"],
        ].map(([en,pron,es])=>`
        <div class="vocab-item">
          <div class="vocab-en">${en.split('→')[0].trim()}</div>
          <div class="vocab-pron">${pron} → <span style="color:var(--accent2)">${en.split('→')[1]?.trim()||''}</span></div>
          <div class="vocab-es">${es}</div>
        </div>`).join('')}
      </div>`,

    isare: `
      <div class="section-title">IS y ARE</div>
      <div class="info-box">
        <b>IS</b> = es / está → con <b>He, She, It</b><br>
        <b>ARE</b> = son / están → con <b>You, We, They</b>
      </div>
      <table class="conj-table">
        <tr><th>Pronombre</th><th>Verbo</th><th>Significado</th></tr>
        <tr><td>He / She / It</td><td class="en">IS</td><td class="es">es / está</td></tr>
        <tr><td>You / We / They</td><td class="en">ARE</td><td class="es">son / están</td></tr>
      </table>
      <div class="section-title">Frases de práctica</div>
      ${[
        ["He is a good boy","Él es un buen niño"],
        ["She is my sister","Ella es mi hermana"],
        ["It is very cold","Está muy frío"],
        ["You are young","Usted es joven"],
        ["We are in the garden","Estamos en el jardín"],
        ["They are happy","Ellos son felices"],
        ["The book is on the table","El libro está sobre la mesa"],
        ["The boys are tall","Los niños son altos"],
      ].map(([en,es])=>`<div class="phrase-row"><span class="phrase-en">${en}</span><span class="phrase-es">${es}</span></div>`).join('')}`,

    adj1: `
      <div class="section-title">El Adjetivo en Inglés</div>
      <div class="info-box">
        El adjetivo siempre va <b>ANTES</b> del sustantivo.<br>
        Es completamente <b>invariable</b>: no cambia para masculino, femenino o plural.
      </div>
      <div class="vocab-grid">
        ${[
          ["A bad boy","Un niño malo"],["A blue sky","Un cielo azul"],
          ["Clean water","Agua limpia"],["A strong man","Un hombre fuerte"],
          ["A white dress","Un vestido blanco"],["A good girl","Una niña buena"],
          ["A young woman","Una mujer joven"],["A black hat","Un sombrero negro"],
          ["A new house","Una casa nueva"],["A bright light","Una luz brillante"],
          ["A poor man","Un hombre pobre"],["A deep river","Un río profundo"],
          ["A sweet fruit","Una fruta dulce"],["A small table","Una mesa pequeña"],
          ["A wise woman","Una mujer sabia"],["A kind boy","Un niño bondadoso"],
          ["A dirty street","Una calle sucia"],
        ].map(([en,es])=>`
        <div class="vocab-item">
          <div class="vocab-en">${en}</div>
          <div class="vocab-es">${es}</div>
        </div>`).join('')}
      </div>`,

    verbos1: `
      <div class="section-title">Los 16 Verbos Básicos</div>
      <div class="info-box">El Inglés Básico solo usa <b>16 verbos</b> para reemplazar a miles. Para el presente: quitar TO + pronombre. <b>He/She/It</b> agrega <b>-s</b>.</div>
      <table class="conj-table">
        <tr><th>#</th><th>Infinitivo</th><th>Pron.</th><th>Significado</th></tr>
        ${[
          ["1","To come","(cám)","Venir"],["2","To let","(let)","Dejar"],
          ["3","To go","(gou)","Ir"],["4","To put","(put)","Poner"],
          ["5","To take","(téik)","Tomar"],["6","To give","(guív)","Dar"],
          ["7","To get","(guét)","Conseguir"],["8","To keep","(kíip)","Mantener"],
          ["9","To make","(méik)","Hacer"],["10","To do","(dúu)","Hacer"],
          ["11","To seem","(síim)","Parecer"],["12","To say","(séi)","Decir"],
          ["13","To see","(síi)","Ver"],["14","To send","(sénd)","Enviar"],
          ["15","To be","(bíi)","Ser/Estar"],["16","To have","(jáv)","Tener/Haber"],
        ].map(([n,inf,pron,es])=>`<tr><td style="color:var(--muted)">${n}</td><td class="en">${inf}</td><td style="color:var(--muted);font-style:italic">${pron}</td><td class="es">${es}</td></tr>`).join('')}
      </table>`,

    vocab1: `
      <div class="section-title">Vocabulario — Grupo A</div>
      <div class="vocab-grid">
        ${[
          ["Hat","(jat)","Sombrero"],["Brother","(brádeR)","Hermano"],
          ["Blue","(blúu)","Azul"],["Garden","(gáardn)","Jardín"],
          ["Fork","(fóork)","Tenedor"],["Son","(san)","Hijo"],
          ["Sky","(skái)","Cielo"],["They","(déi)","Ellos"],
          ["The","(di)","El/La/Los/Las"],["This","(dis)","Este/Esta/Esto"],

// HELPERS
// ════════════════════════════════════════════════════════

function examItem(q,a) {
  return `<div class="exam-item">
    <div class="exam-q">${q}</div>
    <button class="btn-reveal" onclick="revealOne(this)">Ver respuesta</button>
    <div class="exam-a">${a}</div>
  </div>`;
}

function quiz(questions) {
  const id = Math.random().toString(36).slice(2,8);
  return `<div class="quiz-wrap" id="quiz-${id}" data-qs='${JSON.stringify(questions).replace(/'/g,"&#39;")}' data-idx="0" data-score="0"></div>`;
}

// ════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════
let currentLesson = null;
let completed = JSON.parse(localStorage.getItem('ib_done')||'[]');

function saveCompleted() {
  try { localStorage.setItem('ib_done', JSON.stringify(completed)); } catch(e){}
}

// ════════════════════════════════════════════════════════
// HOME
// ════════════════════════════════════════════════════════

function renderHome() {
  const grid = document.getElementById('lessons-grid');
  grid.innerHTML = LESSONS.map(l => {
    const done = completed.includes(l.num);
    const tagColors = ['tag-blue','tag-gold','tag-green','tag-red'];
    const topicWords = l.subtitle.split('·').slice(0,3).map((t,i)=>
      `<span class="tag ${tagColors[i%4]}">${t.trim()}</span>`).join('');
    return `
    <div class="lesson-card" onclick="openLesson(${l.num})">
      <div class="lesson-num ${done?'done':''}" style="${done?'':'border-color:'+l.color+'33;color:'+l.color}">
        ${done ? '✓' : l.num}
      </div>
      <div class="lesson-info">
        <h3>${l.title}</h3>
        <div class="lesson-tags">${topicWords}</div>
      </div>
      <span class="lesson-arrow">›</span>
    </div>`;
  }).join('');
  document.getElementById('global-progress').style.width = (completed.length/LESSONS.length*100)+'%';
}

// ════════════════════════════════════════════════════════
// LESSON VIEW
// ════════════════════════════════════════════════════════

function openLesson(num) {
  const l = LESSONS.find(x => x.num === num);
  currentLesson = l;
  document.getElementById('home').style.display = 'none';
  const lv = document.getElementById('lesson-view');
  lv.style.display = 'flex';

  document.getElementById('lesson-title').textContent = l.title;

  // Tabs
  const tabsEl = document.getElementById('tabs-container');
  tabsEl.innerHTML = l.tabs.map((t,i) =>
    `<div class="tab ${i===0?'active':''}" onclick="switchTab('${t.id}',this)">${t.label}</div>`
  ).join('');

  // Content
  const content = document.getElementById('lesson-content');
  content.innerHTML = l.tabs.map((t,i) =>
    `<div class="panel ${i===0?'active':''}" id="panel-${t.id}">${l.panels[t.id]||''}</div>`
  ).join('');

  // Init quizzes
  content.querySelectorAll('.quiz-wrap').forEach(el => renderQuiz(el));

  // Mark done
  if (!completed.includes(num)) {
    completed.push(num);
    saveCompleted();
  }
  window.scrollTo(0,0);
}

function switchTab(id, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-'+id)?.classList.add('active');
}

function goHome() {
  document.getElementById('lesson-view').style.display = 'none';
  document.getElementById('home').style.display = 'flex';
  renderHome();
  window.scrollTo(0,0);
}

// ════════════════════════════════════════════════════════
// EXAM
// ════════════════════════════════════════════════════════

function revealOne(btn) {
  const item = btn.closest('.exam-item');
  const ans = item.querySelector('.exam-a');
  ans.style.display = 'block';
  btn.style.display = 'none';
}

function revealAll(btn) {
  const container = btn.closest('.panel');
  container.querySelectorAll('.exam-a').forEach(a => a.style.display='block');
  container.querySelectorAll('.btn-reveal').forEach(b => b.style.display='none');
  btn.textContent = 'Todas las respuestas mostradas ✓';
  btn.style.color = 'var(--accent2)';
  btn.style.borderColor = 'var(--accent2)';
}

// ════════════════════════════════════════════════════════
// QUIZ ENGINE
// ════════════════════════════════════════════════════════

function renderQuiz(el) {
  const qs = JSON.parse(el.dataset.qs.replace(/&#39;/g,"'"));
  const idx = parseInt(el.dataset.idx);
  const score = parseInt(el.dataset.score);

  if (idx >= qs.length) {
    el.innerHTML = `
      <div class="quiz-result">
        <div class="quiz-score">${score}/${qs.length}</div>
        <p>${score===qs.length ? '¡Perfecto! Lección dominada.' : score >= qs.length*0.7 ? '¡Muy bien! Sigue practicando.' : 'Repasa el contenido e intenta de nuevo.'}</p>
        <button class="btn-restart" onclick="restartQuiz(this)">Reiniciar Quiz</button>
      </div>`;
    return;
  }

  const q = qs[idx];
  // q format: [question, opt1, opt2, opt3, opt4, correct]
  const question = q[0];
  const options = q.slice(1, q.length-1);
  const correct = q[q.length-1];
  const shuffled = options.sort(()=>Math.random()-.5);

  el.innerHTML = `
    <div class="quiz-progress">
      <div class="quiz-bar"><div class="quiz-fill" style="width:${idx/qs.length*100}%"></div></div>
      <span class="quiz-counter">${idx+1}/${qs.length}</span>
    </div>
    <div class="quiz-card">
      <div class="quiz-q">${question}</div>
      <div class="quiz-options">
        ${shuffled.map(o=>`<button class="quiz-opt" onclick="answerQuiz(this,'${o.replace(/'/g,"&#39;")}','${correct.replace(/'/g,"&#39;")}',this.closest('.quiz-wrap'))">${o}</button>`).join('')}
      </div>
    </div>`;
}

function answerQuiz(btn, chosen, correct, wrap) {
  const opts = wrap.querySelectorAll('.quiz-opt');
  opts.forEach(o => o.onclick=null);

  const isCorrect = chosen === correct;
  btn.classList.add(isCorrect ? 'correct' : 'wrong');

  if (!isCorrect) {
    opts.forEach(o => { if (o.textContent===correct) o.classList.add('correct'); });
  }

  wrap.dataset.score = String(parseInt(wrap.dataset.score) + (isCorrect?1:0));
  wrap.dataset.idx = String(parseInt(wrap.dataset.idx)+1);

  setTimeout(() => renderQuiz(wrap), 900);
}

function restartQuiz(btn) {
  const wrap = btn.closest('.quiz-wrap');
  wrap.dataset.idx = '0';
  wrap.dataset.score = '0';
  renderQuiz(wrap);
}

// ════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════
renderHome();
